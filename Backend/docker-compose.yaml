services:
  rag-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://host:5432/dbname
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      APP_AI_SERVICES: http://host:9000
      APP_CHUNKER_MAX_TOKENS: 4096
      APP_CHUNKER_OVERLAP_SIZE: 64
      APP_VECTOR_SEARCH_BOUNDARY_0_: 0.1
      APP_VECTOR_SEARCH_BOUNDARY_1_: 0.6
      LOGGING_LEVEL_RAG_DOCHANDLER: INFO
