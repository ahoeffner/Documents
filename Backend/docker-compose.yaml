name: documents

services:
  documents:
    image: documents
    container_name: documents
    build:
      context: ..
      dockerfile: Backend/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./prompts.yaml:/app/prompts.yaml
      - ./lang:/app/lang
