name: documents

services:
  documents:
    image: documents
    container_name: documents
    build:
      context: ..
      dockerfile: Backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://home:5432/private
      SPRING_DATASOURCE_USERNAME: alex
      SPRING_DATASOURCE_PASSWORD: Manager1
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      APP_AI_SERVICES: http://home:9000
      APP_CHUNKER_MAX_TOKENS: 4096
      APP_CHUNKER_OVERLAP_SIZE: 64
      APP_VECTOR_SEARCH_BOUNDARY_0_: 0.1
      APP_VECTOR_SEARCH_BOUNDARY_1_: 0.6
      LOGGING_LEVEL_AI_DOCHANDLER: INFO
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 50MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 50MB
