server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

database:
  url: jdbc:postgresql://home:5432/private
  username: uid
  password: pwd
  minimum-idle: 1
  maximum-pool-size: 3

app:
  gemini:
    api-key: YOUR_API_KEY_HERE
    prompts-file: ./prompts.yaml
    llm-model: gemini-2.5-flash-lite
    embedding-model: models/gemini-embedding-001
    timeout-seconds: 300
    embedding-retries: 3
    max-conversations: 64

  hosts:
    localhost: documents
    home.hoeffner.net: documents
    private.hoeffner.net: documents
    slotsdalen.hoeffner.net: slotsdalen

  tesseract:
    pdf-dpi: 300
    language: dan

  chunker:
    max-tokens: 4096
    overlap-size: 64

  vector-search:
    boundary:
      - 0.1
      - 0.6

logging:
  level:
    ai.dochandler: INFO
