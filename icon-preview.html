<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #1e1e2e; color: #cdd6f4; display: flex; gap: 32px; padding: 40px; align-items: flex-start; flex-wrap: wrap; }
  .opt { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 12px; color: #a6adc8; }
  button { width: 42px; height: 38px; border: none; border-radius: 6px; background: #89b4fa; color: #1e1e2e; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  button:hover { background: #74c7ec; }
</style>
</head>
<body>

<div class="opt">
  <button>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
    </svg>
  </button>
  <span class="label">A — burger</span>
</div>

<div class="opt">
  <button>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h8a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h10a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
    </svg>
  </button>
  <span class="label">B — burger uneven</span>
</div>

<div class="opt">
  <button>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <rect x="3" y="5" width="18" height="2" rx="1"/>
      <rect x="3" y="11" width="14" height="2" rx="1"/>
      <rect x="3" y="17" width="18" height="2" rx="1"/>
    </svg>
  </button>
  <span class="label">C — burger short mid</span>
</div>

<div class="opt">
  <button>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <rect x="3" y="5" width="18" height="2" rx="1"/>
      <rect x="7" y="11" width="10" height="2" rx="1"/>
      <rect x="3" y="17" width="18" height="2" rx="1"/>
    </svg>
  </button>
  <span class="label">D — burger center short</span>
</div>

<div class="opt">
  <button>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path d="M2 4.5A1.5 1.5 0 013.5 3h13a1.5 1.5 0 010 3h-13A1.5 1.5 0 012 4.5zm0 5A1.5 1.5 0 013.5 8h13a1.5 1.5 0 010 3h-13A1.5 1.5 0 012 9.5zm1.5 3.5a1.5 1.5 0 000 3h13a1.5 1.5 0 000-3h-13z"/>
    </svg>
  </button>
  <span class="label">E — thick burger</span>
</div>

</body>
</html>
